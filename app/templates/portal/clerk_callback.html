{% extends "portal/base.html" %}
{% block content %}
<section class="page-header">
  <div>
    <h2>Signing you in</h2>
    <p class="subtle">We’re securely linking your Clerk session to the Resona parent portal.</p>
  </div>
</section>
<article class="card" style="max-width:720px;">
  <p class="subtle">Please wait a moment while we finish the secure handoff.</p>
  <p class="pill" id="clerk-sync-status">Checking your session…</p>
  <div class="portal-inline-actions" id="portal-callback-actions" hidden>
    <button type="button" class="button" id="portal-callback-retry">Retry sign-in</button>
    <a class="button ghost" id="portal-callback-back" href="{{ sign_in_url }}">Back to sign in</a>
  </div>
</article>
<script id="portal-callback-data" type="application/json">{{ {"next_path": next_path, "sign_in_url": sign_in_url}|tojson }}</script>
{% endblock %}
{% block body_scripts %}
<script type="module" src="/static/portal-callback.js"></script>
{% endblock %}
