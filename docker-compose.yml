services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
      POSTGRES_DB: companion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://companion:companion@postgres:5432/companion
      DATABASE_SYNC_URL: postgresql+psycopg://companion:companion@postgres:5432/companion
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "80:8000"
    volumes:
      - ./config:/app/config
      - ./var:/app/var

volumes:
  postgres_data:
